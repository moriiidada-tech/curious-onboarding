<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>庫樂思 新人入職系統</title>
<style>
:root {
  /* Brand palette */
  --cream-0: #FFFAF3;
  --cream-1: #FFF2DB;
  --cream-2: #FFE5BF;
  --cream-3: #F5D4A0;
  --red:     #F62440;
  --red-dim: #C41A31;
  --red-bg:  #FEE8EB;

  /* Warm neutrals */
  --gray-50: #FDFAF6;
  --gray-100: #F3EDE4;
  --gray-200: #E2D6C8;
  --gray-400: #A8977F;
  --gray-600: #6B5A42;
  --gray-800: #2C1E0F;

  /* Semantic tokens */
  --text-primary:   #241508;
  --text-secondary: #5C4830;
  --text-muted:     #A8977F;
  --border:         #EDD8BA;
  --border-light:   #F5EAD8;
  --bg-page:        #FFFAF3;
  --bg-sidebar:     #FFF2DB;
  --bg-white:       #FFFFFF;
  --accent:         #F62440;
  --accent-hover:   #C41A31;
  --highlight:      #FFE5BF;
  --highlight-border: #F5D4A0;

  /* Legacy aliases kept for compatibility */
  --blue-50:  #FFF2DB;
  --blue-100: #FFE5BF;
  --blue-200: #F5D4A0;
  --blue-400: #F62440;
  --blue-600: #C41A31;
  --blue-800: #2C1E0F;
  --yellow-50:  #FFF2DB;
  --yellow-100: #FFE5BF;
  --yellow-200: #F5D4A0;
  --yellow-400: #F62440;
  --yellow-600: #C41A31;

  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* Layout */
.shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* Header */
.header {
  background: var(--bg-white);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  gap: 0;
  flex-shrink: 0;
  height: 52px;
}
.logo {
  font-size: 13.5px;
  font-weight: 700;
  color: #F62440;
  margin-right: 28px;
  letter-spacing: .02em;
  white-space: nowrap;
}
.doc-tabs { display: flex; gap: 0; height: 100%; }
.doc-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 20px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
  cursor: pointer;
  border-bottom: 2.5px solid transparent;
  transition: all .15s;
  white-space: nowrap;
}
.doc-tab:hover { color: var(--text-secondary); }
.doc-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.doc-tab .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .6; }
.progress-chip {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
  color: var(--text-muted);
}
.progress-track {
  width: 100px;
  height: 5px;
  background: #FFE5BF;
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #F62440, #C41A31);
  border-radius: 99px;
  width: 0%;
  transition: width .4s;
}

/* Body layout */
.body { display: flex; flex: 1; overflow: hidden; }

/* Sidebar */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 99px; }

.nav-section-label {
  padding: 8px 16px 4px;
  font-size: 10.5px;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.nav-item {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  padding: 7px 16px;
  cursor: pointer;
  border-left: 3px solid transparent;
  font-size: 12.5px;
  line-height: 1.4;
  color: var(--text-secondary);
  transition: all .12s;
  text-decoration: none;
}
.nav-item:hover { color: var(--text-primary); background: #FFE5BF; }
.nav-item.active {
  color: #C41A31;
  background: #FFE5BF;
  border-left-color: #F62440;
  font-weight: 600;
}
.nav-num {
  font-size: 10px;
  color: var(--text-muted);
  padding-top: 2px;
  flex-shrink: 0;
  min-width: 16px;
  font-weight: 500;
}
.nav-item.active .nav-num { color: var(--accent); }

/* Main content */
.main { flex: 1; overflow-y: auto; padding: 36px 44px; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 99px; }

.section { display: none; max-width: 760px; }
.section.active { display: block; }

.section-tag {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  color: #C41A31;
  background: #FFE5BF;
  padding: 3px 10px;
  border-radius: 99px;
  margin-bottom: 10px;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.section h1 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 20px;
  line-height: 1.3;
}

/* Callout */
.callout {
  background: #FFF2DB;
  border-left: 4px solid #F62440;
  padding: 12px 16px;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  margin: 14px 0;
  font-size: 13.5px;
  line-height: 1.7;
  color: var(--text-secondary);
}
.callout.yellow {
  background: #FFE5BF;
  border-left-color: #F5D4A0;
}
.callout strong { color: var(--text-primary); }

/* Section heading */
.sh { font-size: 13.5px; font-weight: 600; color: var(--text-primary); margin: 18px 0 8px; }

/* List items */
.list { margin: 0; }
.li {
  display: flex;
  gap: 10px;
  padding: 7px 0;
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--text-secondary);
  border-top: 1px solid var(--border-light);
}
.li:first-child { border-top: none; }
.li-bullet { color: var(--text-muted); flex-shrink: 0; font-weight: 500; min-width: 18px; }
.li-key { font-weight: 600; color: var(--text-primary); flex-shrink: 0; min-width: 80px; }

/* Cards grid */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 14px 0; }
.card {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
}
.card-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; }
.card-sub { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
.card-body { font-size: 12.5px; color: var(--text-secondary); line-height: 1.6; }
.card.blue-tint { background: #FFF2DB; border-color: #EDD8BA; }
.card.yellow-tint { background: #FFE5BF; border-color: #F5D4A0; }

/* Do/Don't */
.dd { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0; }
.do-box {
  background: #FFF2DB;
  border: 1px solid #EDD8BA;
  border-left: 3px solid #A8C4A0;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  padding: 12px 14px;
}
.dont-box {
  background: #FEE8EB;
  border: 1px solid #F9C0C8;
  border-left: 3px solid #F62440;
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  padding: 12px 14px;
}
.do-label { font-size: 11px; font-weight: 700; color: #3E6E38; margin-bottom: 7px; letter-spacing: .04em; }
.dont-label { font-size: 11px; font-weight: 700; color: #C41A31; margin-bottom: 7px; letter-spacing: .04em; }
.do-box p { font-size: 13px; color: #3E6E38; line-height: 1.6; }
.dont-box p { font-size: 13px; color: #C41A31; line-height: 1.6; }

/* Checklist */
.checklist-box {
  background: #FFFAF3;
  border: 1.5px solid #FFE5BF;
  border-top: 3px solid #F62440;
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  margin-top: 24px;
}
.checklist-title {
  font-size: 12.5px;
  font-weight: 700;
  color: #F62440;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 7px;
  letter-spacing: .03em;
  text-transform: uppercase;
}
.checklist-title svg { flex-shrink: 0; }
.check-row {
  display: flex;
  align-items: flex-start;
  gap: 11px;
  padding: 9px 0;
  border-top: 1px solid #FFE5BF;
}
.check-row:first-of-type { border-top: none; }
.check-row input[type="checkbox"] {
  flex-shrink: 0;
  width: 16px;
  height: 16px;
  margin-top: 1px;
  accent-color: #F62440;
  cursor: pointer;
}
.check-row label {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.5;
  cursor: pointer;
}
.check-row input:checked + label {
  text-decoration: line-through;
  color: var(--text-muted);
}

/* Tables */
.tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin: 14px 0;
  background: var(--bg-white);
  border-radius: var(--radius-md);
  overflow: hidden;
  border: 1px solid var(--border);
}
.tbl thead th {
  padding: 10px 14px;
  text-align: left;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--text-muted);
  background: #FFF2DB;
  border-bottom: 1px solid var(--border);
  letter-spacing: .04em;
  text-transform: uppercase;
}
.tbl tbody td {
  padding: 10px 14px;
  color: var(--text-secondary);
  border-top: 1px solid var(--border-light);
  vertical-align: top;
  line-height: 1.5;
}
.tbl tbody td:first-child { font-weight: 600; color: var(--text-primary); }
.tbl tbody tr:hover td { background: #FFF2DB; }

/* Q&A boxes */
.qa-box {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin: 10px 0;
}
.qa-q { font-size: 13.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.qa-a { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* Blot boxes (盲點 style) */
.bc-box {
  background: var(--bg-white);
  border: 1px solid var(--border);
  border-left: 4px solid var(--yellow-400);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  padding: 12px 16px;
  margin: 10px 0;
}
.bc-title { font-size: 13.5px; font-weight: 600; color: var(--text-primary); margin-bottom: 5px; }
.bc-risk { font-size: 12.5px; color: #9B3030; margin-bottom: 4px; }
.bc-fix { font-size: 12.5px; color: #2D6E2D; }

/* Code / template block */
.tpl-box {
  background: var(--gray-50);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 16px;
  margin: 12px 0;
  font-family: "SF Mono", Consolas, monospace;
  font-size: 12.5px;
  line-height: 2;
  color: var(--text-secondary);
}

/* Badge */
.badge {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 9px;
  border-radius: 99px;
  margin-left: 6px;
}
.badge-blue { background: var(--blue-100); color: var(--blue-600); }
.badge-yellow { background: var(--yellow-100); color: var(--yellow-600); }

/* Step list */
.step-list { display: flex; flex-direction: column; gap: 8px; margin: 12px 0; }
.step-item {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #F62440;
  color: #FFFAF3;
  font-size: 11.5px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
}
.step-body { font-size: 13.5px; color: var(--text-secondary); line-height: 1.5; padding-top: 3px; }
.step-body strong { color: var(--text-primary); }

/* Separator */
.sep { border: none; border-top: 1px solid var(--border-light); margin: 20px 0; }

/* Responsive */
@media (max-width: 860px) {
  .sidebar { width: 180px; }
  .main { padding: 24px 24px; }
  .grid-2, .dd { grid-template-columns: 1fr; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--blue-200); border-radius: 99px; }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header class="header">
    <div class="logo">庫樂思 Curious</div>
    <div class="doc-tabs">
      <div class="doc-tab active" id="tab-0" onclick="switchDoc(0)">
        <div class="dot"></div> 新人訓練路徑
      </div>
      <div class="doc-tab" id="tab-1" onclick="switchDoc(1)">
        <div class="dot"></div> 新人生活與內部資訊手冊
      </div>
    </div>
    <div class="progress-chip">
      <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
      <span id="prog-label">0%</span>
    </div>
  </header>

  <!-- Body -->
  <div class="body">
    <nav class="sidebar" id="sidebar-nav"></nav>
    <main class="main" id="main-content"></main>
  </div>

</div>

<script>
// ─────────────────────────────────────────────
// Data
// ─────────────────────────────────────────────
const DOCS = [
// ══════ DOC 0：新人訓練路徑 ══════
{
  label: '新人訓練路徑',
  sections: [
    {
      num:'一', title:'訓練總目標', tag:'總覽',
      html:`
        <div class="callout">本文件提供給新進行政、課務、客服與營運夥伴使用。目的不是讓人死背課程名稱，而是讓新人能正確理解庫樂思的課程邏輯、判斷家長所在階段、避免錯誤承諾，並能在 LINE 對話中做出清楚、安全、可追蹤的回覆。</div>
        <div class="sh">完成訓練後，應具備以下 8 項能力</div>
        <div class="list">
          ${['能說清楚庫樂思的核心定位','能分辨各項課程與賽事關係','能完成每日環境檢查、點名、LINE OA 維護、繳費通知、收款追蹤、請假補課交接','能判斷家長目前是在詢問、報名、繳費、銜接、賽季、比賽或補課哪一個階段','能清楚說明基礎培訓、銜接課程、暑期密集班、暑期集訓、賽季培訓、Meeting 等各名詞差異','能在回覆前確認費用範圍，避免家長誤以為某筆費用已包含後續課程或比賽','能知道哪些問題可以直接回覆，哪些必須先向其他人確認','能整理 LINE 對話中的待辦事項，並追蹤未解決問題'].map((t,i)=>`<div class="li"><span class="li-bullet">${i+1}.</span><span>${t}</span></div>`).join('')}
        </div>`,
      checks:[]
    },
    {
      num:'二', title:'每天要確認四件事', tag:'日常',
      html:`
        <div class="grid-2">
          ${[['到課確認','學生有沒有正確到課'],['LINE 維護','LINE 上的問題有沒有被回覆或轉交'],['費用追蹤','費用、資料、合約、表單有沒有被追蹤'],['待辦落地','老師或主管交代的事項有沒有落到可執行的待辦']].map(([t,b])=>`<div class="card blue-tint"><div class="card-title">${t}</div><div class="card-body">${b}</div></div>`).join('')}
        </div>
        <div class="sh">回覆原則</div>
        <div class="list">
          ${['不確定就先確認，不要猜','涉及費用先講涵蓋範圍，不只丟帳號','涉及賽隊先說評估，不保證安排','涉及補課先確認規則與老師時間，不直接承諾','涉及比賽先確認名稱、日期、費用、資格與報名狀態'].map(t=>`<div class="li"><span class="li-bullet">→</span><span>${t}</span></div>`).join('')}
        </div>`,
      checks:[]
    },
    {
      num:'三', title:'新人要先建立的核心觀念', tag:'觀念',
      html:`
        <div class="callout yellow"><strong>庫樂思不是單純才藝班</strong>，而是以機器人競賽為核心，帶孩子從基礎能力、平台轉換、賽季培訓一路走到正式比賽。</div>
        <div class="list">
          ${['家長買的不是單一堂課，而是一段學習與競賽路徑','課程名稱、比賽名稱、硬體平台、費用項目很容易被家長混在一起','只要費用、賽隊資格、比賽、請假補課講不清楚，就容易造成後續誤會','新人回覆 LINE 時，重點不是回得快，而是回得準確、邊界清楚、可追蹤'].map(t=>`<div class="li"><span class="li-bullet">→</span><span>${t}</span></div>`).join('')}
        </div>`,
      checks:[]
    },
    {
      num:'四', title:'完整學習路徑總覽', tag:'總覽',
      html:`
        <div class="callout">建議訓練期為 4 週，依新人狀況可壓縮或延長。</div>
        <table class="tbl">
          <thead><tr><th style="width:90px">階段</th><th style="width:110px">期間</th><th>學習重點</th><th>完成標準</th></tr></thead>
          <tbody>
            ${[['第 0 階段',4,'到職前/第 1 天','公司定位、開通權限、可使用的工具','知道庫樂思在做什麼、資料在哪、有問題找誰'],['第 1 階段',5,'第 1 週','課程地圖、行政日常、LINE 回覆','能分辨課程分類、能處理低風險 LINE 訊息'],['第 2 階段',6,'第 2 週','收款追蹤、請假補課、課程認知','能做完收款流程、知道當日課程'],['第 3 階段',7,'第 3 週','判斷認知','能處理常見問題並標記待辦'],['第 4 階段',8,'第 4 週','實戰跟線與考核','能獨立處理行政與低風險對話'],['第 5 階段',9,'第 3 週後半','LINE 回覆訓練：回覆前步驟、低/高風險判斷、待辦標記','能分辨可直接回覆與需確認的問題'],['第 6 階段',10,'第 3～4 週','家長溝通語氣：對外原則、建議與不建議用語','能把模糊說法改成安全說法'],['第 7 階段',11,'第 4～7 週','實戰跟線（4 週漸進）','完成 10 則低風險、5 則中風險草稿'],['考核',12,'訓練結束後','五項考核全部通過','通過全部考核並獲主管確認'],['盲點複習',13,'持續','5 大常見盲點確認','能自主發現回覆中邊界不清楚之處']].map(([a,si,b,c,d])=>`<tr><td><a href="#" onclick="showSec(0,${si});return false;" style="color:var(--accent);text-decoration:none;font-weight:500;">${a}</a></td><td style="font-weight:400;color:var(--text-muted)">${b}</td><td>${c}</td><td>${d}</td></tr>`).join('')}
          </tbody>
        </table>`,
      checks:[]
    },
    {
      num:'五', title:'第 0 階段：到職前與第 1 天', tag:'階段 0',
      html:`
        <div class="callout">目標：讓新人先知道公司在做什麼、東西在哪裡、不能亂回什麼。</div>
        <div class="sh">必讀資料</div>
        <div class="list">
          ${['課程地圖','家長常見問答 FAQ','課程通知模板','未解決問題追蹤表'].map(t=>`<div class="li"><span class="li-bullet">•</span><span>${t}</span></div>`).join('')}
        </div>

// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
let curDoc = 0;
let curSec = [0, 0];
const states = {};
const navEls = [[], []];
const secEls = [[], []];

// ─────────────────────────────────────────────
// Build DOM
// ─────────────────────────────────────────────
const navEl = document.getElementById('sidebar-nav');
const mainEl = document.getElementById('main-content');

DOCS.forEach((doc, di) => {
  const label = document.createElement('div');
  label.className = 'nav-section-label';
  label.textContent = doc.label;
  label.dataset.doc = di;
  navEl.appendChild(label);

  doc.sections.forEach((s, si) => {
    // Nav item
    const ni = document.createElement('div');
    ni.className = 'nav-item';
    ni.dataset.doc = di;
    ni.innerHTML = `<span class="nav-num">${s.num}</span><span>${s.title}</span>`;
    ni.addEventListener('click', () => { curSec[di] = si; showSec(di, si); });
    navEl.appendChild(ni);
    navEls[di].push(ni);

    // Section
    const cl = s.checks.length ? `
      <div class="checklist-box">
        <div class="checklist-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          階段檢核
        </div>
        ${s.checks.map((c, ci) => {
          const id = `chk_${di}_${si}_${ci}`;
          return `<div class="check-row"><input type="checkbox" id="${id}" data-k="${di}_${si}_${ci}"><label for="${id}">${c}</label></div>`;
        }).join('')}
      </div>` : '';

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.innerHTML = `<div class="section-tag">${s.tag}</div><h1>${s.num}、${s.title}</h1>${s.html}${cl}`;
    mainEl.appendChild(sec);
    secEls[di].push(sec);
  });
});

// ─────────────────────────────────────────────
// Progress
// ─────────────────────────────────────────────
function calcProgress(di) {
  const total = DOCS[di].sections.reduce((a, s) => a + s.checks.length, 0);
  const done = DOCS[di].sections.reduce((a, s, si) =>
    a + s.checks.filter((_, ci) => states[`${di}_${si}_${ci}`]).length, 0);
  return total > 0 ? Math.round(done / total * 100) : 0;
}

function updateProgress() {
  const p = calcProgress(curDoc);
  document.getElementById('prog-fill').style.width = p + '%';
  document.getElementById('prog-label').textContent = p + '%';
}

mainEl.addEventListener('change', e => {
  if (e.target.type === 'checkbox') {
    states[e.target.dataset.k] = e.target.checked;
    updateProgress();
  }
});

// ─────────────────────────────────────────────
// Navigation
// ─────────────────────────────────────────────
function showSec(di, si) {
  // Update nav active state (only in current doc)
  navEls[di].forEach((el, i) => el.classList.toggle('active', i === si));
  // Update sections
  secEls[di].forEach((el, i) => el.classList.toggle('active', i === si));
  mainEl.scrollTop = 0;
}

function switchDoc(di) {
  curDoc = di;
  // Tab active
  document.getElementById('tab-0').classList.toggle('active', di === 0);
  document.getElementById('tab-1').classList.toggle('active', di === 1);

  // Show/hide nav labels and items
  navEl.querySelectorAll('[data-doc]').forEach(el => {
    el.style.display = parseInt(el.dataset.doc) === di ? '' : 'none';
  });

  // Show/hide sections
  DOCS.forEach((_, d) => {
    secEls[d].forEach(el => el.classList.remove('active'));
  });
  showSec(di, curSec[di]);
  updateProgress();
}

// ─────────────────────────────────────────────
// Init
// ─────────────────────────────────────────────
switchDoc(0);
</script>
